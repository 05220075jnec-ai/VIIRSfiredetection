<!DOCTYPE html>
<html>
<head>

    <title>Dynamic Forest Fire Susceptibility Map</title>

    <meta charset="utf-8" />

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>

        body{
            margin:0;
            padding:0;
        }

        #map{
            width:100%;
            height:100vh;
        }

        .panel{
            position:absolute;
            top:10px;
            left:10px;
            z-index:1000;
            background:white;
            padding:15px;
            border-radius:8px;
        }

    </style>

</head>

<body>

<div class="panel">

    <h3>Dynamic Fire Risk Map</h3>

    <label>Start Date</label><br>
    <input type="date" id="startDate"
           value="2024-11-01"><br><br>

    <label>End Date</label><br>
    <input type="date" id="endDate"
           value="2024-12-31"><br><br>

    <button onclick="loadMap()">
        Generate Map
    </button>

</div>

<div id="map"></div>

<script>

var map = L.map('map').setView([27.5, 90.5], 8);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'OSM'
}).addTo(map);

var fireLayer;

function loadMap(){

    var start = document.getElementById(
        'startDate'
    ).value;

    var end = document.getElementById(
        'endDate'
    ).value;

    fetch(`/generate_map?start=${start}&end=${end}`)

    .then(response => response.json())

    .then(data => {

        if(fireLayer){
            map.removeLayer(fireLayer);
        }

        fireLayer = L.tileLayer(
            data.tile_url,
            {
                attribution:'Google Earth Engine'
            }
        );

        fireLayer.addTo(map);

    });

}

loadMap();

</script>

</body>
</html>
